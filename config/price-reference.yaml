      used range. Interested in speakers that are well-regarded, hold their
      value, and are never a bad buy at the right price.

      MODELS OF PARTICULAR INTEREST:
      - Focal Aria 906 (~$1,300 new, ~$700 used) — already tracking separately
        but surface if dramatically underpriced here too
      - Wharfedale Denton 85th Anniversary (~$700 new, ~$350-400 used)
      - Wharfedale Linton (~$1,500 new, ~$800-900 used) — technically a
        larger standmount, still fits
      - Monitor Audio Silver 50/100 7G (~$600-1,000 new, ~$350-500 used)
      - Monitor Audio Gold 100 5G (~$2,000 new, ~$900-1,100 used)
      - KEF LS50 Meta (~$1,600 new, ~$800-1,000 used)
      - KEF LS50 (original, ~$500 used) — the classic, a steal under $350
      - Elac Debut Reference DBR62 (~$500 new, ~$250 used)
      - Q Acoustics Concept 300 (~$2,500 new, ~$1,200 used)
      - Dynaudio Evoke 10/20 (~$1,000-1,600 new, ~$500-800 used)

      NOT INTERESTED IN:
      - Home theater satellite speakers / soundbar replacements
      - Bluetooth/powered speakers (Edifier, Kanto, etc.)
      - Vintage speakers unless exceptionally desirable (JBL L100, AR, etc.)
      - Speakers without grilles available or with obvious driver damage
      - Single speakers (need pairs)

      CONDITION: pairs only. Cosmetic wear OK. Grilles preferred but not
      required. Must be functional — no blown drivers or rattling.

      KEY JUDGMENT: Is this pair underpriced relative to its own typical
      used market value? Surface anything that passes the flip test.
  - id: holy-panda
    name: Drop+Invyr Holy Panda (original)
    type: switch
    category: keyboards
    query: holy panda
    sites:
      - mechmarket
      - ebay
    site_overrides:
      ebay:
        query: drop invyr holy panda
    msrp: 1
    fair_used: 1.2
    deal_price: 1
    steal_price: 0.6
    shipping_notes: |
      Switches are small and light — US shipping is cheap ($4-5 USPS First
      Class). Continental US and Canada both fine. International: acceptable
      if total landed cost per switch still meets deal_price.
    notes: |
      CRITICAL: MUST be the original Drop+Invyr Holy Panda, NOT the mass-
      produced Drop Holy Panda X (which is a completely different switch
      with a different stem/housing). The originals are out of production
      since ~2020 and increasingly rare.

      HOW TO IDENTIFY:
      - Original: "Drop + Invyr Holy Panda" branding, sometimes just "Holy
        Panda." Sold in packs of 70/90/110 in a white cardboard box.
      - Holy Panda X: "Drop Holy Panda X" branding, currently in production,
        different color stem (more orange). These are NOT desirable.
      - Fakes/clones (Glorious Panda, BSUN, Yok, etc.) are also not
        desirable — must be the genuine Drop+Invyr originals.

      QUANTITY: need 70+ switches (one full 65% board). Prefer 70 or 90
      packs. A lot of <70 is not useful unless the per-switch price is
      exceptional enough to justify buying partials.

      CONDITION:
      - Stock (unmodified) strongly preferred.
      - Lubed is acceptable if it's a quality lube job (Tribosys 3203/3204
        or Krytox 205g0). Poorly lubed = worse than stock.
      - Desoldered is fine if they weren't over-heated.
      - Filmed (switch films added) is fine, slight plus.

      On mechmarket, prices are typically listed as total-for-lot (e.g.
      "$55 shipped for 70x"). Normalize to per-switch for tier comparison.
  - id: w211-e500
    name: 2003-2006 Mercedes-Benz E500 (W211)
    type: vehicle
    category: auto
    allowed_states:
      - MA
      - NH
      - RI
      - CT
      - ME
      - VT
      - NY
      - NJ
      - PA
      - MD
      - VA
      - DE
    queries:
      - E500 W211
      - Mercedes E500
    sites:
      - craigslist
      - fbmp
    year_range:
      - 2003
      - 2006
    engine: M113 5.0L V8
    fair_price: 8000
    deal_price: 5500
    steal_price: 3500
    max_mileage: 120000
    shipping_notes: |
      Vehicle — local pickup only. Listings more than ~500 miles from Boston, MA
      should be marked irrelevant unless the price is dramatically below deal_price
      to justify a one-way flight + drive home. No international listings.
    notes: |
      KEY ISSUES TO WATCH FOR:
      - SBC (Sensotronic Brake Control): The hydraulic brake pump.
        Replacement is $2-3k. If listing says "SBC serviced" or
        "brake pump replaced," that's a huge plus. MY2006 had
        extended warranty to 25yr/unlimited miles for SBC.
      - Airmatic suspension: Air struts fail, $800-1200 per corner.
        "Lowered overnight" or sagging corner = airmatic failure.
        If converted to coilovers, that's fine but affects ride.
      - Transmission (722.6 5-speed auto): Needs fluid+filter service
        every 40-60k. "Lifetime fluid" is a myth. If seller confirms
        trans service history, that's a significant plus.
      - Balance shaft sprocket (LESS relevant — mainly M272 V6 issue,
        M113 V8 is more reliable on this front)

      BUYER PREFERENCES:
      - Color: BLACK strongly preferred. Silver/grey acceptable but a discount.
        Other colors (white, blue, brown, etc.) are a real negative — downgrade
        a tier unless price compensates.
      - Drivetrain: RWD strongly preferred. 4MATIC (AWD) is undesirable — more
        complex, extra failure points, heavier. A 4MATIC listing should be
        downgraded a tier unless priced well below a comparable RWD.

      IDEAL LISTING SIGNALS:
      - Black exterior, RWD (non-4MATIC)
      - "SBC replaced/serviced"
      - "New air struts" or "Arnott/Bilstein airmatic"
      - "Trans fluid changed at Xk"
      - Service records / single owner / garaged
      - Under 120k miles

      RED FLAGS:
      - "Runs and drives" with no detail = hiding something
      - Under $3k = almost guaranteed major mechanical issue
      - "Needs work" on a W211 = money pit
      - Salvage/rebuilt title
  - id: cheap-nintendo-switch-party-games
    name: Budget Nintendo Switch Party Games
    type: category_hunt
    sites:
      - fbmp
    category: general
    queries:
      - nintendo switch party game
      - mario party switch
      - jackbox switch
      - overcooked switch
      - nintendo switch bundle
    shipping_notes: >
      Prioritize local pickup for bundles to avoid shipping costs, which can negate the 'cheap' aspect of individual
      games.
    profile: >
      The user is looking for affordable Nintendo Switch games, specifically focused on party-oriented titles suitable
      for groups. 


      Target titles include: Mario Party (Super Mario Party, Mario Party Superstars), Jackbox Party Packs, Overcooked!
      All You Can Eat, Mario Kart 8 Deluxe, and Snipperclips. 


      Budget range: Looking for games significantly below MSRP, ideally in the $15-$35 range per title. Bundles are
      highly preferred. 


      Condition requirements: Must be working cartridges. Case/box is preferred but not strictly required if the price
      is low enough. 


      What NOT to surface: Digital codes (avoid due to scam risk), sports simulation games (FIFA/NBA 2K), or
      single-player-only narrative games. 


      Judgment criteria: Evaluate listings based on the 'per-game' cost. If a listing is a bundle, calculate the average
      price per cartridge. Flag listings that are priced at or near MSRP as 'not a deal'.
