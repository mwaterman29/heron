# User profile — defaults inherited by every reference unless overridden.
user:
  location: boston

references:
  # ── Focal Aria 906 ────────────────────────────────────

  - id: focal-aria-906
    name: "Focal Aria 906"
    type: bookshelf_speaker
    category: audio
    query: "focal aria 906"
    # ~100mi radius from Boston for FBMP/Craigslist location filtering
    allowed_states: [MA, NH, RI, CT, ME, VT, NY]
    sites:
      - hifishark
      - usaudiomart
      - audiogon
      - ebay
      - craigslist
      - fbmp
    msrp: 1300         # per pair
    fair_used: 700      # typical used price, good condition
    deal_price: 550     # would buy immediately at this price
    steal_price: 400    # almost certainly broken or scam below this
    shipping_notes: |
      Bulky ~40lb pair, fragile drivers. US-based listings only (including CAN if
      ground-shippable). International listings (UK, EU, AU, etc.) are IRRELEVANT
      even at very low sticker prices — international shipping + import duty +
      damage risk on fragile speakers adds $200-400+ to the landed cost and
      eliminates any "deal" unless the price is roughly 50%+ below deal_price.
      If the listing location is clearly outside the US/Canada, mark as irrelevant.
    notes: |
      Flax cone midrange/woofer, TNF tweeter.
      Check for tweeter damage (exposed inverted dome is fragile).
      Earlier 900 series (non-906) has a different tweeter, less desirable.
      Only interested in the pair — single speaker is not useful.

  # ── SVS Subwoofers ────────────────────────────────────

  - id: svs-sb
    name: "SVS SB-1000 / SB-12"
    type: subwoofer
    category: audio
    query: "svs subwoofer"
    allowed_states: [MA, NH, RI, CT, ME, VT, NY]
    sites:
      - hifishark
      - usaudiomart
      - audiogon
      - ebay
      - craigslist
      - fbmp
    # Some sites index tightly enough that a model-specific query works better.
    # Audiogon and eBay also get a second grail-hunt query for the SB-12+ Rosenut.
    site_overrides:
      hifishark:
        query: "svs sb"
      usaudiomart:
        queries: ["svs sb-1000", "svs sb-12"]
      audiogon:
        queries: ["svs sb", "svs sb-12 rosenut"]
      ebay:
        queries: ["svs sb-1000", "svs sb-12 plus rosenut"]
    variants:
      - model: "SB-1000 Pro"
        msrp: 600
        fair_used: 350
        deal_price: 275
        steal_price: 200
      - model: "SB-1000 (original)"
        msrp: 500
        fair_used: 275
        deal_price: 200
        steal_price: 150
      - model: "SB-12-NSD"
        msrp: 400          # discontinued
        fair_used: 200
        deal_price: 150
        steal_price: 100
    grail: |
      SB-12+ (Plus model, NOT NSD) in Rosenut finish.
      This is a discontinued limited variant. Extremely rare.
      If found under $300 in any condition, flag immediately.
      Rosenut finish is the only one of interest for this model.
    shipping_notes: |
      Subwoofers are heavy (35-50lb) and bulky. US-based listings only (CAN
      acceptable if ground-shippable). Non-US listings are irrelevant — shipping
      and duty would eliminate any deal. EXCEPTION: the SB-12+ Rosenut grail is
      rare enough that international listings should still be flagged if they
      match grail criteria, so we can at least evaluate.

  # ── Drop+Invyr Holy Panda ──────────────────────────────

  - id: holy-panda
    name: "Drop+Invyr Holy Panda (original)"
    type: switch
    category: keyboards
    query: "holy panda"
    sites:
      - mechmarket
      - ebay
    site_overrides:
      ebay:
        query: "drop invyr holy panda"
    # Pricing is per-switch. The LLM should normalize any per-lot price
    # (e.g. "$55 for 70x") to per-switch for comparison.
    msrp: 1.00            # original retail per switch (long OOP)
    fair_used: 1.20       # per switch — scarce OOP item, willing to pay retail
    deal_price: 1.00      # per switch — would buy immediately
    steal_price: 0.60     # per switch — almost certainly fakes or wrong model
    shipping_notes: |
      Switches are small and light — US shipping is cheap ($4-5 USPS First
      Class). Continental US and Canada both fine. International: acceptable
      if total landed cost per switch still meets deal_price.
    notes: |
      CRITICAL: MUST be the original Drop+Invyr Holy Panda, NOT the mass-
      produced Drop Holy Panda X (which is a completely different switch
      with a different stem/housing). The originals are out of production
      since ~2020 and increasingly rare.

      HOW TO IDENTIFY:
      - Original: "Drop + Invyr Holy Panda" branding, sometimes just "Holy
        Panda." Sold in packs of 70/90/110 in a white cardboard box.
      - Holy Panda X: "Drop Holy Panda X" branding, currently in production,
        different color stem (more orange). These are NOT desirable.
      - Fakes/clones (Glorious Panda, BSUN, Yok, etc.) are also not
        desirable — must be the genuine Drop+Invyr originals.

      QUANTITY: need 70+ switches (one full 65% board). Prefer 70 or 90
      packs. A lot of <70 is not useful unless the per-switch price is
      exceptional enough to justify buying partials.

      CONDITION:
      - Stock (unmodified) strongly preferred.
      - Lubed is acceptable if it's a quality lube job (Tribosys 3203/3204
        or Krytox 205g0). Poorly lubed = worse than stock.
      - Desoldered is fine if they weren't over-heated.
      - Filmed (switch films added) is fine, slight plus.

      On mechmarket, prices are typically listed as total-for-lot (e.g.
      "$55 shipped for 70x"). Normalize to per-switch for tier comparison.

  # ── W211 E500 ─────────────────────────────────────────

  - id: w211-e500
    name: "2003-2006 Mercedes-Benz E500 (W211)"
    type: vehicle
    category: auto
    # Wider radius for vehicles — worth driving further for a good deal
    allowed_states: [MA, NH, RI, CT, ME, VT, NY, NJ, PA, MD, VA, DE]
    queries:
      - "E500 W211"
      - "Mercedes E500"
    sites:
      - craigslist
      - fbmp
    year_range: [2003, 2006]
    engine: "M113 5.0L V8"
    fair_price: 8000
    deal_price: 5500
    steal_price: 3500
    max_mileage: 120000
    shipping_notes: |
      Vehicle — local pickup only. Listings more than ~500 miles from Boston, MA
      should be marked irrelevant unless the price is dramatically below deal_price
      to justify a one-way flight + drive home. No international listings.
    notes: |
      KEY ISSUES TO WATCH FOR:
      - SBC (Sensotronic Brake Control): The hydraulic brake pump.
        Replacement is $2-3k. If listing says "SBC serviced" or
        "brake pump replaced," that's a huge plus. MY2006 had
        extended warranty to 25yr/unlimited miles for SBC.
      - Airmatic suspension: Air struts fail, $800-1200 per corner.
        "Lowered overnight" or sagging corner = airmatic failure.
        If converted to coilovers, that's fine but affects ride.
      - Transmission (722.6 5-speed auto): Needs fluid+filter service
        every 40-60k. "Lifetime fluid" is a myth. If seller confirms
        trans service history, that's a significant plus.
      - Balance shaft sprocket (LESS relevant — mainly M272 V6 issue,
        M113 V8 is more reliable on this front)

      BUYER PREFERENCES:
      - Color: BLACK strongly preferred. Silver/grey acceptable but a discount.
        Other colors (white, blue, brown, etc.) are a real negative — downgrade
        a tier unless price compensates.
      - Drivetrain: RWD strongly preferred. 4MATIC (AWD) is undesirable — more
        complex, extra failure points, heavier. A 4MATIC listing should be
        downgraded a tier unless priced well below a comparable RWD.

      IDEAL LISTING SIGNALS:
      - Black exterior, RWD (non-4MATIC)
      - "SBC replaced/serviced"
      - "New air struts" or "Arnott/Bilstein airmatic"
      - "Trans fluid changed at Xk"
      - Service records / single owner / garaged
      - Under 120k miles

      RED FLAGS:
      - "Runs and drives" with no detail = hiding something
      - Under $3k = almost guaranteed major mechanical issue
      - "Needs work" on a W211 = money pit
      - Salvage/rebuilt title
