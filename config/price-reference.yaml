  - id: endgame-iems
    name: High-end tribrid IEMs
    type: category_hunt
    category: audio
    queries:
      - EST IEM
      - tribrid IEM
      - empire ears
      - elysian
      - 64audio
    sites:
      - avexchange
      - hifishark
      - ebay
      - usaudiomart
    site_overrides:
      ebay:
        queries:
          - empire ears raven
          - elysian annihilator
          - 64audio fourte
          - unique melody MEST
      hifishark:
        queries:
          - empire ears
          - elysian annihilator
          - 64audio
          - unique melody MEST
    shipping_notes: |
      IEMs are tiny and light — US shipping is trivial ($5-8 USPS Priority).
      International is acceptable if total landed cost still represents a
      bargain. Canada always fine. EU/Asia acceptable for steals.
    profile: |
      Looking for high-end tribrid IEMs, preferably with EST (electrostatic)
      drivers for fast treble transients. Primary use: electronic music with
      rapid percussion — the speed advantage of ESTs matters here.

      CURRENT REFERENCE: Unique Melody U4s. Love the tuning, want more
      resolution and faster transient response. Tried Thieaudio Monarch Mk3
      and loved the transparency — looking for that level of detail or better.

      BUDGET: up to ~$2,500 used. Anything under $1,500 that's normally
      $2,500+ new is a strong deal. Under $1,000 for a $2k+ IEM is a steal.

      BRANDS/MODELS OF PARTICULAR INTEREST (not exhaustive — surface any
      high-end tribrid that fits):
      - Empire Ears Raven (~$3,400 new) — DD + 4BA + 4EST, very resolving
      - Empire Ears Legend X / Odin — flagship, exceptional bass + detail
      - Elysian Annihilator 2023 (~$3,300 new) — the transparency benchmark
      - Elysian Pilgrim — more affordable entry from same house
      - 64Audio Fourté / Fourté Noir (~$3,800 new) — tia driver, fast treble
      - 64Audio U18s (~$3,000 new) — pure reference monitor, 18 BA
      - 64Audio Trio — tribrid, good bass + detail balance
      - Unique Melody MEST MkII/III (~$1,700 new) — bone conduction + EST,
        same house sound as my U4s, natural upgrade path
      - Subtonic Storm (~$2,500 new) — DD + 6BA + 2EST, fast transients
      - FATfreq Grand Maestro — tribrid, known for bass and resolution
      - Vision Ears VE8 / Erlkönig — ultra-high-end, incredible resolution

      NOT INTERESTED IN:
      - Single-DD budget IEMs (Moondrop Aria, Truthear, etc.)
      - Chi-fi under $500 new (KZ, CCA, TRN, etc.)
      - Pure BA sets without EST/DD (unless it's a known flagship like U18s)
      - Heavily used / damaged units (cosmetic wear OK, driver issues not OK)

      CONDITION: must be complete with case + tips. Aftermarket cable OK.
      Cosmetic wear acceptable. No channel imbalance or driver flex issues.

      KEY JUDGMENT: Is this item underpriced relative to its own typical
      used market value? The "flip test" — could the buyer resell for more
      than the asking price? If yes, always surface it.
